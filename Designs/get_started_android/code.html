<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ShiftProof - Get Started</title>
<!-- Google Fonts: Manrope -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                    boxShadow: {
                        "elevation-1": "0 1px 2px 0 rgba(0, 0, 0, 0.05)",
                        "elevation-2": "0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)",
                        "elevation-3": "0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05)",
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            font-size: 24px;
        }
        /* Custom styles for Google Logo alignment */
        .google-icon {
            width: 20px;
            height: 20px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased font-display">
<div class="relative flex min-h-screen w-full flex-col overflow-hidden max-w-md mx-auto bg-white dark:bg-background-dark shadow-xl">
<!-- Header / Navigation -->
<div class="flex items-center justify-between p-4 pb-2">
<button class="flex size-12 shrink-0 items-center justify-center rounded-full text-slate-900 dark:text-slate-100 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
</div>
<!-- Hero / Branding Section -->
<div class="flex flex-col items-center justify-center pt-8 pb-6 px-6">
<div class="mb-6 h-32 w-32 rounded-2xl bg-gradient-to-br from-primary/20 to-primary/5 flex items-center justify-center overflow-hidden relative shadow-elevation-2">
<!-- Abstract logo representation -->
<div class="absolute inset-0 bg-primary opacity-10 blur-xl rounded-full"></div>
<span class="material-symbols-outlined text-primary text-6xl relative z-10">apartment</span>
</div>
<h1 class="text-slate-900 dark:text-slate-50 tracking-tight text-[32px] font-extrabold leading-tight text-center">
                Get started
            </h1>
<p class="text-slate-600 dark:text-slate-400 text-lg font-medium leading-normal mt-3 text-center">
                Manage PGs or rent properties
            </p>
<div class="flex items-center gap-2 mt-2">
<span class="material-symbols-outlined text-emerald-500 text-[18px]">verified_user</span>
<p class="text-slate-500 dark:text-slate-500 text-sm font-normal leading-normal text-center">
                    No spam. No ads.
                </p>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-4 px-6 py-4 mt-auto mb-6">
<!-- Google Sign In -->
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-full h-14 px-5 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-900 dark:text-white gap-3 shadow-elevation-1 transition-all active:scale-[0.98]">
<!-- Simple SVG for Google Logo to avoid external dependency issues -->
<svg class="w-5 h-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-base font-bold tracking-wide">Continue with Google</span>
</button>
<!-- Phone Number Sign In -->
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-full h-14 px-5 bg-primary hover:bg-blue-600 text-white gap-3 shadow-elevation-2 transition-all active:scale-[0.98]">
<span class="material-symbols-outlined text-white">call</span>
<span class="text-base font-bold tracking-wide">Continue with Phone</span>
</button>
<!-- Divider -->
<div class="relative flex py-2 items-center">
<div class="flex-grow border-t border-slate-200 dark:border-slate-700"></div>
<span class="flex-shrink mx-4 text-slate-400 dark:text-slate-500 text-xs font-medium uppercase tracking-wider">or</span>
<div class="flex-grow border-t border-slate-200 dark:border-slate-700"></div>
</div>
<!-- Email / Other Options -->
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-full h-14 px-5 bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-slate-100 gap-3 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined">mail</span>
<span class="text-base font-bold tracking-wide">Continue with Email</span>
</button>
</div>
<!-- Footer / Skip -->
<div class="pb-8 pt-2 text-center">
<button class="text-slate-500 dark:text-slate-400 font-semibold text-sm hover:text-slate-800 dark:hover:text-slate-200 transition-colors px-4 py-2 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800">
                Skip for now
            </button>
<p class="mt-6 text-xs text-slate-400 dark:text-slate-500 px-8">
                By continuing, you agree to our <a class="underline hover:text-primary" href="#">Terms of Service</a> and <a class="underline hover:text-primary" href="#">Privacy Policy</a>.
            </p>
</div>
</div>
</body></html>
