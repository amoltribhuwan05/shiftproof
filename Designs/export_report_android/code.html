<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>ShiftProof - Export Report</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
<!-- Header / TopAppBar -->
<header class="flex items-center bg-background-light dark:bg-background-dark p-4 sticky top-0 z-10 border-b border-primary/10">
<div class="flex size-12 shrink-0 items-center justify-center cursor-pointer hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight tracking-tight ml-2">Export Report</h1>
</header>
<main class="flex-1 flex flex-col max-w-2xl mx-auto w-full">
<!-- Section: Select Format -->
<section class="px-4 py-6">
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold mb-4">Select Format</h2>
<div class="flex flex-col gap-3">
<!-- Format Option: PDF -->
<label class="group relative flex items-center gap-4 rounded-xl border border-primary/20 dark:border-primary/30 p-4 cursor-pointer hover:bg-primary/5 transition-colors">
<div class="flex size-10 shrink-0 items-center justify-center rounded-lg bg-primary/10 text-primary">
<span class="material-symbols-outlined">picture_as_pdf</span>
</div>
<div class="flex grow flex-col">
<p class="text-slate-900 dark:text-slate-100 text-base font-semibold">PDF Report</p>
<p class="text-slate-500 dark:text-slate-400 text-sm">Best for sharing and printing</p>
</div>
<input checked="" class="h-5 w-5 border-2 border-primary/40 bg-transparent text-primary focus:ring-primary focus:ring-offset-background-dark" name="format" type="radio"/>
</label>
<!-- Format Option: Excel -->
<label class="group relative flex items-center gap-4 rounded-xl border border-primary/20 dark:border-primary/30 p-4 cursor-pointer hover:bg-primary/5 transition-colors">
<div class="flex size-10 shrink-0 items-center justify-center rounded-lg bg-primary/10 text-primary">
<span class="material-symbols-outlined">table_view</span>
</div>
<div class="flex grow flex-col">
<p class="text-slate-900 dark:text-slate-100 text-base font-semibold">Excel Spreadsheet</p>
<p class="text-slate-500 dark:text-slate-400 text-sm">Best for data analysis and accounting</p>
</div>
<input class="h-5 w-5 border-2 border-primary/40 bg-transparent text-primary focus:ring-primary focus:ring-offset-background-dark" name="format" type="radio"/>
</label>
</div>
</section>
<!-- Section: Filters -->
<section class="px-4 py-6">
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold mb-4">Filters</h2>
<div class="space-y-6">
<!-- Date Range Field -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium ml-1">Date Range</label>
<div class="flex items-stretch rounded-xl overflow-hidden border border-primary/20 dark:border-primary/30 focus-within:border-primary transition-all">
<input class="flex-1 bg-white dark:bg-primary/5 text-slate-900 dark:text-slate-100 p-4 outline-none border-none placeholder:text-slate-400 text-base font-normal" placeholder="Select dates" readonly="" type="text" value="Oct 1, 2023 - Oct 31, 2023"/>
<div class="bg-white dark:bg-primary/5 px-4 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">calendar_today</span>
</div>
</div>
</div>
<!-- Select Property Field -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium ml-1">Select Property</label>
<div class="relative">
<select class="w-full appearance-none bg-white dark:bg-primary/5 border border-primary/20 dark:border-primary/30 rounded-xl p-4 pr-12 text-slate-900 dark:text-slate-100 focus:ring-primary focus:border-primary outline-none text-base">
<option>All Properties</option>
<option>Grandview Apartments</option>
<option>Sunset Heights</option>
<option>The Marquee Plaza</option>
<option>Riverside Lofts</option>
</select>
<div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-primary">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
</div>
</section>
<!-- Footer / CTA -->
<div class="mt-auto p-4 pb-10">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 active:scale-[0.98]">
<span class="material-symbols-outlined">file_download</span>
<span>Export Report</span>
</button>
<p class="text-center text-slate-500 dark:text-slate-400 text-xs mt-4">
                    Report will be generated and saved to your device.
                </p>
</div>
</main>
<!-- Illustration / Background Accent -->
<div class="fixed bottom-0 right-0 w-64 h-64 -z-10 opacity-10 dark:opacity-5 pointer-events-none overflow-hidden">
<div class="w-full h-full bg-gradient-to-tl from-primary to-transparent rounded-full translate-x-1/2 translate-y-1/2"></div>
</div>
</div>
</body></html>
