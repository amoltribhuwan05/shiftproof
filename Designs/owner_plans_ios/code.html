<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ShiftProof - Plan Selection</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .ios-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<!-- Status Bar Spacer (iOS Style) -->
<div class="h-12 w-full bg-white/80 dark:bg-background-dark/80 sticky top-0 z-50 ios-blur">
<div class="flex justify-between items-center px-6 h-full">
<span class="text-sm font-semibold">9:41</span>
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-base">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-base">wifi</span>
<span class="material-symbols-outlined text-base">battery_full</span>
</div>
</div>
</div>
<!-- Top Navigation Bar -->
<nav class="flex items-center bg-white dark:bg-background-dark px-4 py-2 border-b border-slate-200 dark:border-slate-800">
<button class="p-2 text-primary hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined align-middle">arrow_back_ios</span>
</button>
<div class="flex-1 text-center pr-10">
<span class="text-sm font-semibold uppercase tracking-wider text-slate-500">Registration</span>
</div>
</nav>
<main class="max-w-2xl mx-auto pb-32">
<!-- Header Section -->
<header class="px-6 pt-8 pb-4">
<h1 class="text-3xl font-extrabold tracking-tight text-slate-900 dark:text-white leading-tight">
                Set up your PG or Property
            </h1>
<p class="mt-2 text-slate-500 dark:text-slate-400 text-lg">
                Choose based on how many tenants you manage
            </p>
</header>
<!-- Plans Grid -->
<section class="px-4 space-y-4 mt-4">
<!-- Small PG -->
<label class="relative block group cursor-pointer">
<input checked="" class="peer hidden" name="plan" type="radio"/>
<div class="p-5 rounded-xl border-2 border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 transition-all peer-checked:border-primary peer-checked:ring-1 peer-checked:ring-primary">
<div class="flex justify-between items-start">
<div>
<h3 class="text-lg font-bold text-slate-900 dark:text-white">Small PG</h3>
<p class="text-slate-500 text-sm">Up to 5 tenants</p>
</div>
<div class="text-right">
<span class="text-2xl font-black text-slate-900 dark:text-white">Free</span>
</div>
</div>
<div class="mt-4 flex items-center gap-2 text-primary">
<span class="material-symbols-outlined text-lg">check_circle</span>
<span class="text-sm font-medium">Basic tenant management</span>
</div>
</div>
</label>
<!-- Medium PG (Recommended) -->
<label class="relative block group cursor-pointer">
<input class="peer hidden" name="plan" type="radio"/>
<div class="p-5 rounded-xl border-2 border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 transition-all peer-checked:border-primary peer-checked:ring-1 peer-checked:ring-primary relative overflow-hidden">
<div class="absolute top-0 right-0 bg-primary text-white text-[10px] font-bold px-3 py-1 rounded-bl-lg uppercase tracking-widest">
                        Recommended
                    </div>
<div class="flex justify-between items-start">
<div>
<h3 class="text-lg font-bold text-slate-900 dark:text-white">Medium PG</h3>
<p class="text-slate-500 text-sm">Up to 20 tenants</p>
</div>
<div class="text-right">
<span class="text-2xl font-black text-slate-900 dark:text-white">₹199</span>
<span class="block text-xs text-slate-500 font-bold">/ MONTH</span>
</div>
</div>
<div class="mt-4 flex items-center gap-2 text-primary">
<span class="material-symbols-outlined text-lg">check_circle</span>
<span class="text-sm font-medium">Advanced reporting &amp; Analytics</span>
</div>
</div>
</label>
<!-- Large PG -->
<label class="relative block group cursor-pointer">
<input class="peer hidden" name="plan" type="radio"/>
<div class="p-5 rounded-xl border-2 border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 transition-all peer-checked:border-primary peer-checked:ring-1 peer-checked:ring-primary">
<div class="flex justify-between items-start">
<div>
<h3 class="text-lg font-bold text-slate-900 dark:text-white">Large PG</h3>
<p class="text-slate-500 text-sm">Up to 50 tenants</p>
</div>
<div class="text-right">
<span class="text-2xl font-black text-slate-900 dark:text-white">₹499</span>
<span class="block text-xs text-slate-500 font-bold">/ MONTH</span>
</div>
</div>
<div class="mt-4 flex items-center gap-2 text-primary">
<span class="material-symbols-outlined text-lg">check_circle</span>
<span class="text-sm font-medium">Multi-property support</span>
</div>
</div>
</label>
<!-- Enterprise -->
<label class="relative block group cursor-pointer">
<input class="peer hidden" name="plan" type="radio"/>
<div class="p-5 rounded-xl border-2 border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 transition-all peer-checked:border-primary peer-checked:ring-1 peer-checked:ring-primary">
<div class="flex justify-between items-start">
<div>
<h3 class="text-lg font-bold text-slate-900 dark:text-white">Enterprise</h3>
<p class="text-slate-500 text-sm">100+ tenants</p>
</div>
<div class="text-right">
<span class="text-2xl font-black text-slate-900 dark:text-white">₹999</span>
<span class="block text-xs text-slate-500 font-bold">/ MONTH</span>
</div>
</div>
<div class="mt-4 flex items-center gap-2 text-primary">
<span class="material-symbols-outlined text-lg">check_circle</span>
<span class="text-sm font-medium">Custom API &amp; Support</span>
</div>
</div>
</label>
</section>
<div class="mt-6 px-6 text-center">
<p class="text-sm text-slate-400 dark:text-slate-500">
<span class="material-symbols-outlined text-base align-middle mr-1">info</span>
                You can change plans anytime in settings
            </p>
</div>
</main>
<!-- Bottom Fixed CTA (iOS Style) -->
<div class="fixed bottom-0 left-0 right-0 p-6 pb-10 bg-white/80 dark:bg-background-dark/80 ios-blur border-t border-slate-200 dark:border-slate-800 z-50">
<div class="max-w-2xl mx-auto flex flex-col gap-3">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98]">
                Continue as Owner
            </button>
<p class="text-[10px] text-center text-slate-400 uppercase tracking-widest font-bold">
                Secure checkout powered by Stripe
            </p>
</div>
<!-- iOS Home Indicator -->
<div class="mt-6 mx-auto w-32 h-1.5 bg-slate-300 dark:bg-slate-700 rounded-full"></div>
</div>
</body></html>
