<div class="p-2 rounded-lg bg-purple-500/10 dark:bg-purple-500/20 text-purple-600 dark:text-purple-400 group-hover:scale-110 transition-transform">

</div>
<div class="text-left">
<p class="font-bold text-sm text-slate-900 dark:text-slate-100">Report Issue</p>

<span class="material-symbols-outlined text-[20px]">call</span>

</div>
</div>
</div>
</div>

<span class="material-symbols-outlined text-[24px] font-variation-settings-'FILL'1">home</span>
<span class="text-[10px] font-medium">Home</span>

<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 transition-colors" href="#">
