<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Join a PG or Rental - ShiftProof</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#137fec",
              "background-light": "#f6f7f8",
              "background-dark": "#101922",
              "surface-dark": "#1c252e", 
              "surface-light": "#ffffff"
            },
            fontFamily: {
              "display": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        /* iOS-like smooth scrolling */
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        /* Custom scrollbar hiding for cleaner mobile look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display flex flex-col min-h-screen items-center justify-center sm:py-10">
<!-- Mobile Device Container -->
<div class="relative flex h-screen w-full sm:h-[844px] sm:w-[390px] flex-col overflow-hidden bg-background-light dark:bg-background-dark sm:rounded-[3rem] sm:shadow-2xl sm:border-[8px] sm:border-[#2a2a2a]">
<!-- Status Bar Placeholder (iOS style) -->
<div class="flex items-center justify-between px-6 pt-3 pb-2 w-full z-10">
<div class="text-slate-900 dark:text-slate-100 text-[15px] font-bold tracking-tight">9:41</div>
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100 text-[18px]">signal_cellular_alt</span>
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100 text-[18px]">wifi</span>
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100 text-[18px]">battery_full</span>
</div>
</div>
<!-- Navigation Bar -->
<div class="flex items-center justify-between px-4 py-2">
<button class="flex items-center justify-center w-10 h-10 rounded-full text-primary hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-[24px]">arrow_back_ios_new</span>
</button>
<div class="w-10"></div> <!-- Spacer for visual balance -->
</div>
<!-- Main Content -->
<div class="flex-1 overflow-y-auto no-scrollbar px-5 pt-4 pb-24 flex flex-col">
<!-- Large Title -->
<h1 class="text-slate-900 dark:text-slate-100 text-[34px] font-bold leading-tight tracking-tight mb-8">
                Join a PG or Rental
            </h1>
<!-- iOS Grouped List Style Container -->
<div class="flex flex-col gap-6">
<!-- Input Group -->
<div class="bg-surface-light dark:bg-surface-dark rounded-xl overflow-hidden shadow-sm dark:shadow-none border border-slate-200 dark:border-slate-800">
<!-- Property Code Input -->
<div class="flex flex-col p-4 border-b border-slate-100 dark:border-slate-800">
<label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2 ml-1" for="property-code">
                            Property Code
                        </label>
<input class="bg-transparent border-none p-0 text-xl text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 focus:ring-0 w-full font-medium" id="property-code" inputmode="numeric" placeholder="Enter 6-digit code" type="text"/>
</div>
<!-- Scan QR Button (List Item Style) -->
<button class="w-full flex items-center justify-between p-4 bg-slate-50 dark:bg-[#232d38] hover:bg-slate-100 dark:hover:bg-[#2a3642] active:bg-slate-200 dark:active:bg-[#1e2730] transition-colors group">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-primary/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-[20px]">qr_code_scanner</span>
</div>
<span class="text-base font-medium text-primary">Scan QR Code</span>
</div>
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors text-[20px]">chevron_right</span>
</button>
</div>
<!-- Helper Text -->
<div class="px-2">
<p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed flex items-start gap-2">
<span class="material-symbols-outlined text-[18px] text-slate-400 dark:text-slate-500 mt-0.5">info</span>
                        Ask the owner or your future roommate for the 6-digit invitation code or QR code to join their property.
                    </p>
</div>
</div>
<!-- Spacer to push content up if needed -->
<div class="flex-1"></div>
</div>
<!-- Bottom Sticky Action Area -->
<div class="absolute bottom-0 left-0 w-full bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-t border-slate-200 dark:border-slate-800 px-5 pt-4 pb-8 sm:pb-8">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold text-[17px] h-14 rounded-xl shadow-lg shadow-primary/25 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span>Request to Join</span>
</button>
</div>
<!-- Home Indicator (iOS) -->
<div class="absolute bottom-1 left-1/2 transform -translate-x-1/2 w-[134px] h-[5px] bg-slate-900 dark:bg-white rounded-full opacity-20"></div>
</div>
</body></html>
