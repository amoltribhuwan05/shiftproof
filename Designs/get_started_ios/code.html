<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hide for cleaner mobile look */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 flex flex-col min-h-screen">
<div class="relative flex flex-col flex-grow w-full max-w-md mx-auto bg-white dark:bg-[#1A2633] overflow-hidden min-h-screen shadow-xl sm:rounded-xl sm:my-8 sm:h-[844px]">
<!-- Header / Navigation -->
<div class="flex items-center p-4 justify-between">
<button class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-[24px]">close</span>
</button>
</div>
<!-- Main Content -->
<div class="flex flex-col flex-1 px-6 pb-8 pt-4">
<!-- Hero Illustration/Branding Area (Optional filler for visual balance) -->
<div class="flex-1 flex items-center justify-center py-8">
<div class="relative w-48 h-48 bg-blue-50 dark:bg-slate-800 rounded-full flex items-center justify-center mb-6 overflow-hidden">

</div>
</div>

<div class="mb-8 text-center">
<h1 class="text-slate-900 dark:text-slate-50 tracking-tight text-[32px] font-extrabold leading-tight mb-3">Get started</h1>
<p class="text-slate-500 dark:text-slate-400 text-base font-normal leading-relaxed">
                    Manage PGs or rent properties.<br/>No spam. No ads.
                </p>
</div>
<!-- Buttons Stack -->
<div class="space-y-3 w-full">
<!-- Google Button -->
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-white border border-slate-200 dark:border-slate-700 dark:bg-slate-800 dark:hover:bg-slate-750 hover:bg-slate-50 text-slate-900 dark:text-white gap-3 transition-all active:scale-[0.98]">
<svg class="w-6 h-6" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>

<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>

<span class="text-[17px] font-semibold tracking-tight">Continue with Google</span>
</button>
<!-- Phone Button -->
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-primary hover:bg-blue-600 text-white gap-3 transition-all active:scale-[0.98]">
<span class="material-symbols-outlined text-[22px]">call</span>
<span class="text-[17px] font-semibold tracking-tight">Continue with Phone Number</span>
</button>
</div>
<!-- Divider -->
<div class="relative py-6 flex items-center justify-center w-full">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200 dark:border-slate-700"></div>
</div>
<div class="relative bg-white dark:bg-[#1A2633] px-3">
<span class="bg-white dark:bg-[#1A2633] text-sm text-slate-500 dark:text-slate-400 px-2 font-medium">or</span>
</div>
</div>
<!-- Skip Link -->
<div class="flex justify-center pb-4">
<a class="text-slate-500 dark:text-slate-400 hover:text-primary dark:hover:text-primary text-[15px] font-semibold transition-colors" href="#">
                    Skip for now
                </a>
</div>

<div class="h-4"></div>
</div>
</div>
