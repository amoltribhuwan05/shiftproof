<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Join a PG or Rental</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#137fec",
                "background-light": "#f6f7f8",
                "background-dark": "#101922",
              },
              fontFamily: {
                "display": ["Manrope", "sans-serif"]
              },
              borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<div class="relative flex h-full min-h-screen w-full flex-col overflow-x-hidden">
<!-- Header -->
<div class="flex items-center justify-between p-4 pb-2">
<div class="flex size-12 shrink-0 items-center justify-center text-slate-900 dark:text-slate-100 cursor-pointer">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">
                Join a PG or Rental
            </h2>
<div class="flex w-12 items-center justify-end absolute right-4">
<p class="text-primary text-base font-bold leading-normal tracking-[0.015em] shrink-0 cursor-pointer">Help</p>
</div>
</div>
<!-- Main Content -->
<div class="flex flex-1 flex-col px-6 pt-6">
<!-- Helper Text -->
<div class="mb-8 flex flex-col items-center text-center">
<div class="mb-4 flex h-20 w-20 items-center justify-center rounded-full bg-primary/10 dark:bg-primary/20 text-primary">
<span class="material-symbols-outlined text-4xl">home_work</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 text-2xl font-bold leading-tight mb-2">Find your new home</h1>
<p class="text-slate-500 dark:text-slate-400 text-base font-medium leading-normal max-w-[280px]">
                    To join an existing PG or rental, ask the owner or current roommate for the 6-digit property code.
                </p>
</div>
<!-- Input Section -->
<div class="flex flex-col gap-6">
<label class="flex flex-col gap-2">
<span class="text-slate-900 dark:text-slate-100 text-base font-bold leading-normal ml-1">Property Code</span>
<div class="relative">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-[#1c2127] text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 p-[15px] text-lg font-medium leading-normal tracking-wide text-center uppercase" placeholder="ENTER CODE" type="text" value=""/>
<div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-slate-400">
<span class="material-symbols-outlined text-xl">key</span>
</div>
</div>
</label>
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-slate-200 dark:border-slate-700"></div>
<span class="flex-shrink-0 mx-4 text-slate-400 dark:text-slate-500 text-sm font-medium">OR</span>
<div class="flex-grow border-t border-slate-200 dark:border-slate-700"></div>
</div>
<!-- QR Code Button -->
<button class="group flex w-full cursor-pointer items-center justify-center gap-3 overflow-hidden rounded-xl h-14 px-4 bg-slate-100 dark:bg-[#283039] hover:bg-slate-200 dark:hover:bg-[#323b46] transition-colors border border-transparent hover:border-slate-300 dark:hover:border-slate-600">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100 group-hover:scale-110 transition-transform">qr_code_scanner</span>
<span class="text-slate-900 dark:text-slate-100 text-base font-bold leading-normal tracking-[0.015em]">Scan QR Code</span>
</button>
</div>
<div class="flex-1"></div>
<!-- Bottom Action -->
<div class="flex flex-col gap-4 py-6">
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-full h-14 px-5 bg-primary hover:bg-blue-600 text-white text-lg font-bold leading-normal tracking-[0.015em] shadow-lg shadow-blue-500/20 transition-all active:scale-[0.98]">
<span class="truncate">Request to Join</span>
</button>
<p class="text-center text-xs text-slate-400 dark:text-slate-500 font-medium">
                    By joining, you agree to our Terms of Service
                </p>
</div>
</div>
</div>
</body></html>
