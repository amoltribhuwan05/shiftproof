name: Flutter Build

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

jobs:
  analyze_and_test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        id: analyze
        # fail-on-warnings will fail the job if there are any linting issues.
        # Remove --fatal-warnings if you only want it to fail on actual errors.
        # We write the output to a file so the commenter action can read it.
        run: flutter analyze --write=flutter_analyze.log --fatal-infos --fatal-warnings
        continue-on-error: true # Let the next step run even if analysis fails so it can post comments

      - name: Annotate PR with analysis results
        if: always() # Run this even if the previous step failed
        uses: yorifuji/flutter-analyze-commenter@v1
        with:
          analyze-log: flutter_analyze.log
          verbose: false

      - name: Fail if analysis failed
        # This step ensures the job still fails if the analyze step failed,
        # despite us using continue-on-error above.
        if: steps.analyze.outcome == 'failure'
        run: exit 1

      # Optional: Run tests if the test directory exists
      # - name: Run tests
      #   run: flutter test

  build_android:
    name: Build Android
    needs: analyze_and_test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Build AppBundle
        run: flutter build appbundle --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

      - name: Upload AppBundle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 7

  build_ios:
    name: Build iOS
    needs: analyze_and_test
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Install dependencies
        run: flutter pub get

      # Note: This builds the iOS app without code signing.
      # To distribute to the App Store or TestFlight, you will need to setup
      # provisioning profiles and certificates, often using Fastlane.
      - name: Build iOS (No Codesign)
        run: flutter build ios --release --no-codesign

      - name: Upload iOS Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-app
          path: build/ios/iphoneos/Runner.app
          retention-days: 7
