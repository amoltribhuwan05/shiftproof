basePath: /
definitions:
  model.AppUser:
    properties:
      avatarUrl:
        type: string
      email:
        type: string
      id:
        type: string
      joinDate:
        description: '"YYYY-MM-DD" — never "5 Mar 2026"'
        type: string
      location:
        type: string
      name:
        type: string
      phone:
        type: string
      role:
        description: '"owner" | "tenant"'
        type: string
    type: object
  model.CurrentStay:
    properties:
      address:
        type: string
      dueDate:
        description: '"YYYY-MM-DD"'
        type: string
      imageUrl:
        type: string
      isRentDue:
        description: always bool, never "true"/"false"
        type: boolean
      leaseEnd:
        description: '"YYYY-MM-DD"'
        type: string
      leaseStart:
        description: '"YYYY-MM-DD"'
        type: string
      ownerAvatarUrl:
        type: string
      ownerName:
        type: string
      ownerPhone:
        type: string
      propertyName:
        type: string
      rentAmount:
        description: rupees, always int64
        type: integer
      roomNumber:
        type: string
    type: object
  model.ErrorResponse:
    properties:
      code:
        type: integer
      error:
        type: string
    type: object
  model.Notification:
    properties:
      description:
        type: string
      id:
        type: string
      isRead:
        description: always bool
        type: boolean
      timestamp:
        description: ISO 8601 "2006-01-02T15:04:05Z" — never "2h ago"
        type: string
      title:
        type: string
      type:
        description: '"rentDue"|"message"|"maintenance"|"leaseRenewal"|"general"'
        type: string
    type: object
  model.PaginatedResponse-model_Notification:
    properties:
      data:
        items:
          $ref: '#/definitions/model.Notification'
        type: array
      meta:
        $ref: '#/definitions/model.PaginationMeta'
    type: object
  model.PaginatedResponse-model_Payment:
    properties:
      data:
        items:
          $ref: '#/definitions/model.Payment'
        type: array
      meta:
        $ref: '#/definitions/model.PaginationMeta'
    type: object
  model.PaginatedResponse-model_Payout:
    properties:
      data:
        items:
          $ref: '#/definitions/model.Payout'
        type: array
      meta:
        $ref: '#/definitions/model.PaginationMeta'
    type: object
  model.PaginatedResponse-model_Property:
    properties:
      data:
        items:
          $ref: '#/definitions/model.Property'
        type: array
      meta:
        $ref: '#/definitions/model.PaginationMeta'
    type: object
  model.PaginationMeta:
    properties:
      page:
        type: integer
      total:
        type: integer
      totalPages:
        type: integer
    type: object
  model.Payment:
    properties:
      amount:
        description: rupees, int64
        type: integer
      date:
        description: '"YYYY-MM-DD"'
        type: string
      description:
        type: string
      id:
        type: string
      propertyId:
        type: string
      status:
        description: '"paid"|"pending"|"overdue"'
        type: string
      tenantName:
        type: string
      title:
        type: string
      type:
        description: '"rent"|"deposit"|"electricity"|"maintenance"'
        type: string
    type: object
  model.PaymentSummary:
    properties:
      overdueTenants:
        type: integer
      pendingAmount:
        description: rupees, int64
        type: integer
      totalCollectedThisMonth:
        description: rupees, int64
        type: integer
      totalTenants:
        type: integer
    type: object
  model.Payout:
    properties:
      amount:
        description: rupees, int64
        type: integer
      bankLast4:
        type: string
      date:
        description: '"YYYY-MM-DD"'
        type: string
      description:
        type: string
      id:
        type: string
      propertyTitle:
        type: string
      status:
        description: '"completed"|"processing"|"failed"'
        type: string
    type: object
  model.Plan:
    properties:
      features:
        items:
          type: string
        type: array
      id:
        type: string
      isCurrent:
        type: boolean
      isPopular:
        type: boolean
      maxProperties:
        type: integer
      maxTenants:
        type: integer
      name:
        type: string
      price:
        description: rupees/month, int64
        type: integer
    type: object
  model.Property:
    properties:
      amenities:
        items:
          type: string
        type: array
      deposit:
        description: rupees, always int64
        type: integer
      description:
        type: string
      id:
        type: string
      imageUrl:
        type: string
      location:
        type: string
      occupiedRooms:
        description: derived server-side, never accepted from client
        type: integer
      ownerAvatarUrl:
        type: string
      ownerName:
        type: string
      price:
        description: rupees, always int64
        type: integer
      rating:
        description: float — never int
        type: number
      title:
        type: string
      totalRooms:
        description: always int, never float
        type: integer
      type:
        description: '"PG"|"Flat"|"House"'
        type: string
    type: object
  service.CreatePaymentRequest:
    properties:
      amount:
        type: integer
      description:
        type: string
      idempotencyKey:
        description: from X-Idempotency-Key header, not request body
        type: string
      propertyId:
        type: string
      title:
        type: string
      type:
        enum:
        - rent
        - deposit
        - electricity
        - maintenance
        type: string
    required:
    - amount
    - propertyId
    - title
    - type
    type: object
  service.CreatePropertyRequest:
    properties:
      amenities:
        items:
          type: string
        type: array
      deposit:
        minimum: 0
        type: integer
      description:
        type: string
      location:
        type: string
      price:
        type: integer
      title:
        type: string
      totalRooms:
        minimum: 0
        type: integer
      type:
        enum:
        - PG
        - Flat
        - House
        type: string
    required:
    - location
    - price
    - title
    - type
    type: object
host: localhost:8080
info:
  contact:
    email: support@shiftproof.com
    name: API Support
  description: Engineering-grade backend for property management.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: ShiftProof API
  version: "1.0"
paths:
  /api/v1/auth/device-token:
    post:
      consumes:
      - application/json
      description: Update the user's Firebase Cloud Messaging token for push notifications.
      operationId: registerDeviceToken
      parameters:
      - description: FCM Token
        in: body
        name: token
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - firebase: []
      summary: Register FCM token
      tags:
      - Auth
      x-google-backend:
        address: ${CLOUD_RUN_URL}/api/v1/auth/device-token
        path_translation: CONSTANT_ADDRESS
  /api/v1/auth/logout:
    post:
      description: Invalidate the session and add token to denylist.
      operationId: logout
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - firebase: []
      summary: Logout user
      tags:
      - Auth
      x-google-backend:
        address: ${CLOUD_RUN_URL}/api/v1/auth/logout
        path_translation: CONSTANT_ADDRESS
  /api/v1/auth/me:
    get:
      description: Returns the authenticated user's profile. Creates the user record
        on first sign-in (upsert).
      operationId: getMe
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.AppUser'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - firebase: []
      summary: Get current user profile
      tags:
      - Auth
      x-google-backend:
        address: ${CLOUD_RUN_URL}/api/v1/auth/me
        path_translation: CONSTANT_ADDRESS
  /api/v1/auth/me/current-stay:
    get:
      description: Returns the tenant's active stay details.
      operationId: getCurrentStay
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.CurrentStay'
        "204":
          description: No active stay
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - firebase: []
      summary: Get current lease details
      tags:
      - Auth
      x-google-backend:
        address: ${CLOUD_RUN_URL}/api/v1/auth/me/current-stay
        path_translation: CONSTANT_ADDRESS
  /api/v1/notifications:
    get:
      description: Get a paginated list of user notifications.
      operationId: listNotifications
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.PaginatedResponse-model_Notification'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - firebase: []
      summary: List notifications
      tags:
      - Notifications
      x-google-backend:
        address: ${CLOUD_RUN_URL}/api/v1/notifications
        path_translation: CONSTANT_ADDRESS
  /api/v1/notifications/{id}/read:
    patch:
      description: Marks a specific notification as read and returns the updated resource.
      operationId: markNotificationRead
      parameters:
      - description: Notification ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Notification'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - firebase: []
      summary: Mark notification as read
      tags:
      - Notifications
      x-google-backend:
        address: ${CLOUD_RUN_URL}/api/v1/notifications/{id}/read
        path_translation: CONSTANT_ADDRESS
  /api/v1/notifications/mark-all-read:
    patch:
      description: Marks all notifications for the current user as read.
      operationId: markAllNotificationsRead
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: integer
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - firebase: []
      summary: Mark all notifications as read
      tags:
      - Notifications
      x-google-backend:
        address: ${CLOUD_RUN_URL}/api/v1/notifications/mark-all-read
        path_translation: CONSTANT_ADDRESS
  /api/v1/payments:
    get:
      description: Get a paginated list of payments for the current user. Owners see
        all payments for their properties, tenants see their own.
      operationId: listPayments
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: limit
        type: integer
      - description: Filter by property ID
        in: query
        name: propertyId
        type: string
      - description: Filter by status
        in: query
        name: status
        type: string
      - description: Filter by type
        in: query
        name: type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.PaginatedResponse-model_Payment'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - firebase: []
      summary: List payments
      tags:
      - Payments
      x-google-backend:
        address: ${CLOUD_RUN_URL}/api/v1/payments
        path_translation: CONSTANT_ADDRESS
    post:
      consumes:
      - application/json
      description: Initiate a new payment. Usually called by tenants for rent or deposit.
      operationId: createPayment
      parameters:
      - description: Payment details
        in: body
        name: payment
        required: true
        schema:
          $ref: '#/definitions/service.CreatePaymentRequest'
      - description: Idempotency key to prevent duplicate charges
        in: header
        name: X-Idempotency-Key
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Payment'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - firebase: []
      summary: Create payment
      tags:
      - Payments
      x-google-backend:
        address: ${CLOUD_RUN_URL}/api/v1/payments
        path_translation: CONSTANT_ADDRESS
  /api/v1/payments/collections:
    get:
      description: Get a paginated list of rent-only payments. Shortcut for owners.
      operationId: getCollections
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: limit
        type: integer
      - description: Filter by property ID
        in: query
        name: propertyId
        type: string
      - description: Filter by status
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.PaginatedResponse-model_Payment'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - firebase: []
      summary: List rent collections
      tags:
      - Payments
      x-google-backend:
        address: ${CLOUD_RUN_URL}/api/v1/payments/collections
        path_translation: CONSTANT_ADDRESS
  /api/v1/payments/summary:
    get:
      description: Returns financial summaries (total collected, pending, etc.) for
        the dashboard.
      operationId: getPaymentSummary
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.PaymentSummary'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - firebase: []
      summary: Get payment stats
      tags:
      - Payments
      x-google-backend:
        address: ${CLOUD_RUN_URL}/api/v1/payments/summary
        path_translation: CONSTANT_ADDRESS
  /api/v1/payouts:
    get:
      description: Get a paginated list of bank settlements for an owner.
      operationId: listPayouts
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.PaginatedResponse-model_Payout'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - firebase: []
      summary: List bank payouts
      tags:
      - Plans
      x-google-backend:
        address: ${CLOUD_RUN_URL}/api/v1/payouts
        path_translation: CONSTANT_ADDRESS
  /api/v1/plans:
    get:
      description: Returns all available subscription plans and identifies which one
        the owner is currently on.
      operationId: listPlans
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Plan'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - firebase: []
      summary: List subscription plans
      tags:
      - Plans
      x-google-backend:
        address: ${CLOUD_RUN_URL}/api/v1/plans
        path_translation: CONSTANT_ADDRESS
  /api/v1/properties:
    get:
      consumes:
      - application/json
      description: Get a paginated list of properties
      operationId: listProperties
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.PaginatedResponse-model_Property'
      security:
      - firebase: []
      summary: List properties
      tags:
      - Properties
      x-google-backend:
        address: ${CLOUD_RUN_URL}/api/v1/properties
        path_translation: CONSTANT_ADDRESS
    post:
      consumes:
      - application/json
      description: Create a new property (Owner only)
      operationId: createProperty
      parameters:
      - description: Property details
        in: body
        name: property
        required: true
        schema:
          $ref: '#/definitions/service.CreatePropertyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Property'
      security:
      - firebase: []
      summary: Create property
      tags:
      - Properties
      x-google-backend:
        address: ${CLOUD_RUN_URL}/api/v1/properties
        path_translation: CONSTANT_ADDRESS
  /api/v1/properties/{id}:
    delete:
      description: Soft delete a property by ID (Owner only).
      operationId: deleteProperty
      parameters:
      - description: Property ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - firebase: []
      summary: Delete property
      tags:
      - Properties
      x-google-backend:
        address: ${CLOUD_RUN_URL}/api/v1/properties/{id}
        path_translation: CONSTANT_ADDRESS
    get:
      description: Get details of a single property by its ID.
      operationId: getProperty
      parameters:
      - description: Property ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Property'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - firebase: []
      summary: Get property by ID
      tags:
      - Properties
      x-google-backend:
        address: ${CLOUD_RUN_URL}/api/v1/properties/{id}
        path_translation: CONSTANT_ADDRESS
    put:
      consumes:
      - application/json
      description: Update property details by ID (Owner only).
      operationId: updateProperty
      parameters:
      - description: Property ID
        in: path
        name: id
        required: true
        type: string
      - description: Property details
        in: body
        name: property
        required: true
        schema:
          $ref: '#/definitions/service.CreatePropertyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Property'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - firebase: []
      summary: Update property
      tags:
      - Properties
      x-google-backend:
        address: ${CLOUD_RUN_URL}/api/v1/properties/{id}
        path_translation: CONSTANT_ADDRESS
  /health:
    get:
      description: Get API liveness status
      operationId: healthCheck
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - Health
      x-google-backend:
        address: ${CLOUD_RUN_URL}/health
        path_translation: CONSTANT_ADDRESS
schemes:
- http
- https
securityDefinitions:
  firebase:
    authorizationUrl: https://securetoken.google.com/${FIREBASE_PROJECT_ID}
    flow: implicit
    scopes:
      openid: ' access to identity'
    type: oauth2
    x-google-audiences: ${FIREBASE_PROJECT_ID}
    x-google-issuer: https://securetoken.google.com/${FIREBASE_PROJECT_ID}
    x-google-jwks_uri: https://www.googleapis.com/service_accounts/v1/metadata/x509/securetoken@system.gserviceaccount.com
swagger: "2.0"
tags:
- description: Authentication and User Profile management
  name: Auth
- description: Property listing and management
  name: Properties
- description: Payment processing and billing
  name: Payments
- description: In-app notification system
  name: Notifications
- description: Subscription plans and payouts
  name: Plans
- description: API health and readiness probes
  name: Health
