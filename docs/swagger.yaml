xbasePath: /
definitions:
  handler.AddOrgMemberRequest:
    properties:
      role:
        enum:
        - owner
        - member
        type: string
      userId:
        type: string
    required:
    - role
    - userId
    type: object
  handler.CreateOrgRequest:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  handler.CreateSubscriptionRequest:
    properties:
      planId:
        type: string
    required:
    - planId
    type: object
  handler.UpdateSubscriptionRequest:
    properties:
      planId:
        type: string
    required:
    - planId
    type: object
  handler.payPaymentRequest:
    properties:
      paymentMethod:
        type: string
      transactionRef:
        type: string
    required:
    - paymentMethod
    - transactionRef
    type: object
  model.AppUser:
    properties:
      area:
        type: string
      authIdentifier:
        description: Firebase UID
        type: string
      avatarUrl:
        type: string
      city:
        type: string
      createdAt:
        description: '"YYYY-MM-DD"'
        type: string
      email:
        type: string
      gender:
        description: MALE, FEMALE, CO_LIVING
        type: string
      id:
        type: string
      name:
        type: string
      phoneNumber:
        type: string
      profileCompleted:
        type: boolean
      providers:
        description: '["google", "phone"] — active providers only'
        items:
          type: string
        type: array
      roles:
        description: '"OWNER", "TENANT"'
        items:
          type: string
        type: array
    type: object
  model.AvatarUploadRequest:
    properties:
      contentType:
        description: image/jpeg, image/png, or image/webp
        type: string
      data:
        description: base64-encoded image bytes
        type: string
    type: object
  model.CurrentStay:
    properties:
      address:
        type: string
      dueDate:
        description: '"YYYY-MM-DD"'
        type: string
      imageUrl:
        type: string
      isRentDue:
        description: always bool, never "true"/"false"
        type: boolean
      leaseEnd:
        description: '"YYYY-MM-DD"'
        type: string
      leaseStart:
        description: '"YYYY-MM-DD"'
        type: string
      ownerAvatarUrl:
        type: string
      ownerName:
        type: string
      ownerPhone:
        type: string
      propertyName:
        type: string
      rentAmount:
        description: rupees, always int64
        type: integer
      roomNumber:
        type: string
    type: object
  model.ErrorResponse:
    properties:
      code:
        type: integer
      error:
        type: string
    type: object
  model.ImageUploadRequest:
    properties:
      contentType:
        description: image/jpeg, image/png, or image/webp
        type: string
      data:
        description: base64-encoded image bytes
        type: string
    type: object
  model.Notification:
    properties:
      description:
        type: string
      id:
        type: string
      isRead:
        description: always bool
        type: boolean
      timestamp:
        description: ISO 8601 "2006-01-02T15:04:05Z" — never "2h ago"
        type: string
      title:
        type: string
      type:
        description: '"rentDue"|"message"|"maintenance"|"leaseRenewal"|"general"'
        type: string
    type: object
  model.OnboardingRequest:
    properties:
      area:
        type: string
      city:
        type: string
      gender:
        type: string
      name:
        type: string
      phoneNumber:
        type: string
    type: object
  model.OrgMember:
    properties:
      avatarUrl:
        type: string
      email:
        type: string
      joinedAt:
        description: '"YYYY-MM-DD"'
        type: string
      name:
        type: string
      role:
        description: '"owner" | "member"'
        type: string
      userId:
        type: string
    type: object
  model.Organization:
    properties:
      billingOwnerId:
        type: string
      createdAt:
        description: '"YYYY-MM-DD"'
        type: string
      id:
        type: string
      logoUrl:
        description: '"" when no logo uploaded'
        type: string
      name:
        type: string
    type: object
  model.PaginatedNotificationResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/model.Notification'
        type: array
      meta:
        $ref: '#/definitions/model.PaginationMeta'
    type: object
  model.PaginatedPaymentResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/model.Payment'
        type: array
      meta:
        $ref: '#/definitions/model.PaginationMeta'
    type: object
  model.PaginatedPayoutResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/model.Payout'
        type: array
      meta:
        $ref: '#/definitions/model.PaginationMeta'
    type: object
  model.PaginatedPropertyResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/model.Property'
        type: array
      meta:
        $ref: '#/definitions/model.PaginationMeta'
    type: object
  model.PaginatedTenantResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/model.Tenant'
        type: array
      meta:
        $ref: '#/definitions/model.PaginationMeta'
    type: object
  model.PaginationMeta:
    properties:
      page:
        type: integer
      total:
        type: integer
      totalPages:
        type: integer
    type: object
  model.Payment:
    properties:
      amount:
        description: rupees, int64
        type: integer
      date:
        description: '"YYYY-MM-DD"'
        type: string
      description:
        type: string
      id:
        type: string
      propertyId:
        type: string
      status:
        description: '"paid"|"pending"|"overdue"'
        type: string
      tenantName:
        type: string
      title:
        type: string
      type:
        description: '"rent"|"deposit"|"electricity"|"maintenance"'
        type: string
    type: object
  model.PaymentSummary:
    properties:
      overdueTenants:
        type: integer
      pendingAmount:
        description: rupees, int64
        type: integer
      totalCollectedThisMonth:
        description: rupees, int64
        type: integer
      totalTenants:
        type: integer
    type: object
  model.Payout:
    properties:
      amount:
        description: rupees, int64
        type: integer
      bankLast4:
        type: string
      date:
        description: '"YYYY-MM-DD"'
        type: string
      description:
        type: string
      id:
        type: string
      propertyTitle:
        type: string
      status:
        description: '"completed"|"processing"|"failed"'
        type: string
    type: object
  model.Plan:
    properties:
      features:
        items:
          type: string
        type: array
      id:
        type: string
      isCurrent:
        type: boolean
      isPopular:
        type: boolean
      maxProperties:
        type: integer
      maxTenants:
        type: integer
      name:
        type: string
      price:
        description: rupees/month, int64
        type: integer
    type: object
  model.Property:
    properties:
      amenities:
        items:
          type: string
        type: array
      deposit:
        description: rupees, always int64
        type: integer
      description:
        type: string
      id:
        type: string
      imageUrl:
        description: cover image URL (denormalized for fast list queries)
        type: string
      images:
        description: all images; populated only on GetProperty, empty slice on list
        items:
          $ref: '#/definitions/model.PropertyImage'
        type: array
      location:
        type: string
      occupiedRooms:
        description: derived server-side, never accepted from client
        type: integer
      ownerAvatarUrl:
        type: string
      ownerName:
        type: string
      price:
        description: rupees, always int64
        type: integer
      rating:
        description: float — never int
        type: number
      title:
        type: string
      totalRooms:
        description: always int, never float
        type: integer
      type:
        description: '"PG"|"Flat"|"House"'
        type: string
    type: object
  model.PropertyImage:
    properties:
      id:
        type: string
      isCover:
        type: boolean
      position:
        type: integer
      url:
        type: string
    type: object
  model.PropertyMember:
    properties:
      avatarUrl:
        type: string
      email:
        type: string
      name:
        type: string
      role:
        type: string
      userId:
        type: string
    type: object
  model.PropertyReport:
    properties:
      occupancyRate:
        description: 0.0–1.0
        type: number
      overdueCount:
        type: integer
      payments:
        items:
          $ref: '#/definitions/model.Payment'
        type: array
      totalCollected:
        description: rupees, int64
        type: integer
      totalPending:
        type: integer
    type: object
  model.Room:
    properties:
      capacity:
        description: total beds
        type: integer
      deposit:
        description: rupees, int64
        type: integer
      id:
        type: string
      isAvailable:
        description: capacity > occupiedBeds
        type: boolean
      occupiedBeds:
        description: derived
        type: integer
      propertyId:
        type: string
      rentAmount:
        description: rupees, int64
        type: integer
      roomNumber:
        type: string
      type:
        description: '"single"|"double"|"triple"'
        type: string
    type: object
  model.Subscription:
    properties:
      endDate:
        description: '"YYYY-MM-DD" or ""'
        type: string
      id:
        type: string
      planId:
        type: string
      planName:
        type: string
      price:
        description: rupees, int64
        type: integer
      startDate:
        description: '"YYYY-MM-DD"'
        type: string
      status:
        description: '"active"|"cancelled"|"expired"'
        type: string
    type: object
  model.Tenant:
    properties:
      avatarUrl:
        type: string
      dueDate:
        description: '"YYYY-MM-DD"'
        type: string
      email:
        type: string
      id:
        type: string
      isPaid:
        type: boolean
      joinDate:
        description: '"YYYY-MM-DD"'
        type: string
      name:
        type: string
      phone:
        type: string
      propertyId:
        type: string
      rentAmount:
        description: rupees, int64
        type: integer
      room:
        type: string
      status:
        description: '"active"|"pending"|"overdue"'
        type: string
    type: object
  model.TenantInviteResponse:
    properties:
      expiresAt:
        description: ISO 8601
        type: string
      inviteCode:
        type: string
    type: object
  model.UpdateProfileRequest:
    properties:
      area:
        type: string
      city:
        type: string
      gender:
        type: string
      name:
        type: string
      phoneNumber:
        type: string
    type: object
  service.CreatePaymentRequest:
    properties:
      amount:
        type: integer
      description:
        type: string
      idempotencyKey:
        description: from X-Idempotency-Key header, not request body
        type: string
      propertyId:
        type: string
      title:
        type: string
      type:
        enum:
        - rent
        - deposit
        - electricity
        - maintenance
        type: string
    required:
    - amount
    - propertyId
    - title
    - type
    type: object
  service.CreatePropertyRequest:
    properties:
      amenities:
        items:
          type: string
        type: array
      deposit:
        minimum: 0
        type: integer
      description:
        type: string
      location:
        type: string
      price:
        type: integer
      title:
        type: string
      totalRooms:
        minimum: 0
        type: integer
      type:
        enum:
        - PG
        - Flat
        - House
        type: string
    required:
    - location
    - price
    - title
    - type
    type: object
  service.CreateRoomRequest:
    properties:
      capacity:
        type: integer
      deposit:
        minimum: 0
        type: integer
      rentAmount:
        type: integer
      roomNumber:
        type: string
      type:
        enum:
        - single
        - double
        - triple
        type: string
    required:
    - capacity
    - rentAmount
    - roomNumber
    - type
    type: object
  service.InviteTenantRequest:
    properties:
      email:
        type: string
      leaseEnd:
        type: string
      leaseStart:
        type: string
      phoneNumber:
        type: string
      rentAmount:
        type: integer
      roomId:
        type: string
    required:
    - leaseEnd
    - leaseStart
    - rentAmount
    - roomId
    type: object
  service.JoinPropertyRequest:
    properties:
      inviteCode:
        type: string
    required:
    - inviteCode
    type: object
  service.UpdateRoomRequest:
    properties:
      capacity:
        type: integer
      deposit:
        type: integer
      rentAmount:
        type: integer
      roomNumber:
        type: string
      type:
        type: string
    type: object
  service.UpdateTenantRequest:
    properties:
      leaseEnd:
        type: string
      rentAmount:
        type: integer
      roomId:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@shiftproof.com
    name: API Support
  description: Engineering-grade backend for property management.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: ShiftProof API
  version: "1.0"
paths:
  /api/v1/auth/device-token:
    post:
      consumes:
      - application/json
      description: Update the user's Firebase Cloud Messaging token for push notifications.
      operationId: registerDeviceToken
      parameters:
      - description: FCM Token
        in: body
        name: token
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - firebase: []
      summary: Register FCM token
      tags:
      - Auth
      x-google-backend:
        address: ${CLOUD_RUN_URL}/api/v1/auth/device-token
        path_translation: CONSTANT_ADDRESS
  /api/v1/auth/logout:
    post:
      description: Invalidate the session and add token to denylist.
      operationId: logout
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - firebase: []
      summary: Logout user
      tags:
      - Auth
      x-google-backend:
        address: ${CLOUD_RUN_URL}/api/v1/auth/logout
        path_translation: CONSTANT_ADDRESS
  /api/v1/auth/me:
    get:
      description: Returns the authenticated user's profile. Creates the user record
        on first sign-in (upsert).
      operationId: getMe
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.AppUser'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - firebase: []
      summary: Get current user profile
      tags:
      - Auth
      x-google-backend:
        address: ${CLOUD_RUN_URL}/api/v1/auth/me
        path_translation: CONSTANT_ADDRESS
  /api/v1/auth/me/current-stay:
    get:
      description: Returns the tenant's active stay details.
      operationId: getCurrentStay
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.CurrentStay'
        "204":
          description: No active stay
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - firebase: []
      summary: Get current lease details
      tags:
      - Auth
      x-google-backend:
        address: ${CLOUD_RUN_URL}/api/v1/auth/me/current-stay
        path_translation: CONSTANT_ADDRESS
  /api/v1/notifications:
    get:
      description: Get a paginated list of user notifications.
      operationId: listNotifications
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.PaginatedNotificationResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - firebase: []
      summary: List notifications
      tags:
      - Notifications
      x-google-backend:
        address: ${CLOUD_RUN_URL}/api/v1/notifications
        path_translation: CONSTANT_ADDRESS
  /api/v1/notifications/{id}/read:
    patch:
      description: Marks a specific notification as read and returns the updated resource.
      operationId: markNotificationRead
      parameters:
      - description: Notification ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Notification'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - firebase: []
      summary: Mark notification as read
      tags:
      - Notifications
      x-google-backend:
        address: ${CLOUD_RUN_URL}/api/v1/notifications/{id}/read
        path_translation: CONSTANT_ADDRESS
  /api/v1/notifications/mark-all-read:
    patch:
      description: Marks all notifications for the current user as read.
      operationId: markAllNotificationsRead
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: integer
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - firebase: []
      summary: Mark all notifications as read
      tags:
      - Notifications
      x-google-backend:
        address: ${CLOUD_RUN_URL}/api/v1/notifications/mark-all-read
        path_translation: CONSTANT_ADDRESS
  /api/v1/orgs:
    post:
      consumes:
      - application/json
      description: Creates a new org with the caller as billing owner. One org per
        user.
      operationId: createOrg
      parameters:
      - description: Org name
        in: body
        name: org
        required: true
        schema:
          $ref: '#/definitions/handler.CreateOrgRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Organization'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - firebase: []
      summary: Create an organization
      tags:
      - Organizations
  /api/v1/orgs/{id}/logo:
    post:
      consumes:
      - application/json
      description: Uploads a base64-encoded logo image (jpeg/png/webp, max 5 MB) to
        GCS and updates the org's logoUrl. Caller must be the billing owner.
      operationId: uploadOrgLogo
      parameters:
      - description: Org ID
        in: path
        name: id
        required: true
        type: string
      - description: Base64-encoded image with content type
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.ImageUploadRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Organization'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - firebase: []
      summary: Upload org logo
      tags:
      - Organizations
  /api/v1/orgs/{id}/members:
    get:
      description: Returns all users who are members of the org. Caller must be a
        member.
      operationId: listOrgMembers
      parameters:
      - description: Org ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.OrgMember'
            type: array
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - firebase: []
      summary: List org members
      tags:
      - Organizations
    post:
      consumes:
      - application/json
      description: Adds a user to the org. Caller must be the billing owner.
      operationId: addOrgMember
      parameters:
      - description: Org ID
        in: path
        name: id
        required: true
        type: string
      - description: Member details
        in: body
        name: member
        required: true
        schema:
          $ref: '#/definitions/handler.AddOrgMemberRequest'
      produces:
      - application/json
      responses:
        "204":
          description: Member added
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - firebase: []
      summary: Add a member to an org
      tags:
      - Organizations
  /api/v1/orgs/{id}/members/{userId}:
    delete:
      description: Removes a user from the org. Caller must be the billing owner.
      operationId: removeOrgMember
      parameters:
      - description: Org ID
        in: path
        name: id
        required: true
        type: string
      - description: User ID to remove
        in: path
        name: userId
        required: true
        type: string
      responses:
        "204":
          description: Member removed
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - firebase: []
      summary: Remove a member from an org
      tags:
      - Organizations
  /api/v1/orgs/me:
    get:
      description: Returns the org where the caller is the billing owner.
      operationId: getMyOrg
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Organization'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - firebase: []
      summary: Get caller's organization
      tags:
      - Organizations
  /api/v1/payments:
    get:
      description: Get a paginated list of payments for the current user. Owners see
        all payments for their properties, tenants see their own.
      operationId: listPayments
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: limit
        type: integer
      - description: Filter by property ID
        in: query
        name: propertyId
        type: string
      - description: Filter by status
        in: query
        name: status
        type: string
      - description: Filter by type
        in: query
        name: type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.PaginatedPaymentResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - firebase: []
      summary: List payments
      tags:
      - Payments
      x-google-backend:
        address: ${CLOUD_RUN_URL}/api/v1/payments
        path_translation: CONSTANT_ADDRESS
    post:
      consumes:
      - application/json
      description: Initiate a new payment. Usually called by tenants for rent or deposit.
      operationId: createPayment
      parameters:
      - description: Payment details
        in: body
        name: payment
        required: true
        schema:
          $ref: '#/definitions/service.CreatePaymentRequest'
      - description: Idempotency key to prevent duplicate charges
        in: header
        name: X-Idempotency-Key
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
