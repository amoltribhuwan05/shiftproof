      operationId: updateProfile
      parameters:
      - description: Profile Update
        in: body
        name: profile
        required: true
        schema:
          $ref: '#/definitions/model.UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.AppUser'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - firebase: []
      summary: Update profile
      tags:
      - Auth
      x-google-backend:
        address: ${CLOUD_RUN_URL}/api/v1/users/profile
        path_translation: CONSTANT_ADDRESS
  /api/v1/users/profile/avatar:
    post:
      consumes:
      - application/json
      description: Uploads a base64-encoded profile image (jpeg/png/webp, max 5 MB)
        to GCS and updates the user's avatarUrl.
      operationId: uploadAvatar
      parameters:
      - description: Base64-encoded image with content type
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.AvatarUploadRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.AppUser'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "503":
          description: Storage not configured
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - firebase: []
      summary: Upload profile avatar
      tags:
      - Auth
      x-google-backend:
        address: ${CLOUD_RUN_URL}/api/v1/users/profile/avatar
        path_translation: CONSTANT_ADDRESS
  /health:
    get:
      description: Get API liveness status
      operationId: healthCheck
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - Health
      x-google-backend:
        address: ${CLOUD_RUN_URL}/health
        path_translation: CONSTANT_ADDRESS
  /ready:
    get:
      description: Returns readiness status with dependency checks for DB, Redis, and
        Firebase. Returns 503 if any dependency is unhealthy.
      operationId: readinessCheck
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties: true
            type: object
      summary: Readiness probe
      tags:
      - Health
      x-google-backend:
        address: ${CLOUD_RUN_URL}/ready
        path_translation: CONSTANT_ADDRESS
